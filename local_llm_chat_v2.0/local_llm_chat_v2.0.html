<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Local LLM Chat v2.0</title>
<link rel="stylesheet" href="./css/app.css?v=2.0.0">
<script src="./assets/marked.min.js"></script>
<script src="./assets/pdf.min.js"></script>
<script>
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc = './assets/pdf.worker.min.js';
  }
</script>
</head>
<body>

<!-- ===== Header / Toolbar ===== -->
<header class="toolbar" role="banner">
  <div class="toolbar__left">
    <span class="toolbar__title">Local LLM Chat</span>
  </div>
  <div class="toolbar__center">
    <div class="model-selector">
      <select id="modelSelect" aria-label="モデル選択" title="クリックでモデル一覧を更新"></select>
    </div>
    <div class="model-selector model-selector--compare" id="compareRow" hidden>
      <span class="model-selector__label">vs</span>
      <select id="compareModelSelect" aria-label="比較モデル選択"></select>
    </div>
  </div>
  <div class="toolbar__right">
    <button class="btn-ghost" id="newTopicBtn" aria-label="新しい話題" title="新しい話題">🆕</button>
    <button class="btn-ghost" id="clearBtn" aria-label="クリア" title="すべての会話を消去">🗑️</button>
    <span class="toolbar__divider"></span>
    <button class="btn-ghost" id="moreBtn" aria-label="その他" title="その他">•••</button>
    <span class="toolbar__divider"></span>
    <button class="btn-ghost" id="settingsBtn" aria-label="設定" title="設定">⚙️</button>
  </div>
</header>

<!-- ===== More Menu (Dropdown) ===== -->
<div class="dropdown-menu" id="moreMenu" hidden>
  <button class="dropdown-item" id="exportBtn">💾 エクスポート</button>
  <button class="dropdown-item" id="importBtn">📥 インポート</button>
  <div class="dropdown-divider"></div>
  <button class="dropdown-item" id="compareBtn">📊 比較モード</button>
  <button class="dropdown-item" id="helpBtn">❓ ヘルプモード</button>
</div>
<input type="file" id="importInput" accept=".json" hidden>

<!-- ===== Settings Overlay ===== -->
<div class="overlay" id="settingsOverlay" hidden></div>

<!-- ===== Settings Panel (Slide-over) ===== -->
<aside class="settings-panel" id="settingsPanel" role="dialog" aria-labelledby="settingsTitle" hidden>
  <div class="settings-panel__header">
    <h2 id="settingsTitle" class="settings-panel__title">設定</h2>
    <button class="btn-ghost" id="closeSettingsBtn" aria-label="閉じる">&times;</button>
  </div>

  <!-- Tabs -->
  <div class="settings-panel__tabs">
    <button class="tab active" data-tab="basic">基本</button>
    <button class="tab" data-tab="response">応答</button>
    <button class="tab" data-tab="advanced">詳細</button>
  </div>

  <div class="settings-panel__body">

    <!-- Tab: 基本 -->
    <div class="tab-content active" id="tab-basic">
      <div class="settings-item">
        <div class="settings-item__label">
          <span>🌙 ダークモード</span>
        </div>
        <label class="toggle" id="darkModeToggle" role="switch" aria-checked="false" tabindex="0">
          <input type="checkbox" hidden>
          <span class="toggle__track"><span class="toggle__thumb"></span></span>
        </label>
      </div>
      <div class="settings-item">
        <div class="settings-item__label">
          <span>🔗 Base URL</span>
          <span class="settings-item__desc">デフォルト: http://localhost:1234/v1</span>
        </div>
        <input type="text" id="baseUrl" class="input" value="http://localhost:1234/v1">
      </div>
      <div class="settings-item">
        <div class="settings-item__label">
          <span>🔑 API Key</span>
          <span class="settings-item__desc">通常は変更不要</span>
        </div>
        <input type="text" id="apiKey" class="input" value="lmstudio">
      </div>
      <div class="settings-item">
        <div class="settings-item__label">
          <span>Temperature</span>
          <span class="settings-item__desc">低い=安定、高い=創造的</span>
        </div>
        <div class="settings-item__range">
          <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
          <span id="tempValue" class="range-value">0.7</span>
        </div>
      </div>
      <div class="settings-item">
        <div class="settings-item__label">
          <span>Max Tokens</span>
        </div>
        <input type="number" id="maxTokens" class="input input--sm" min="1" max="8192" value="2048">
      </div>
      <div class="settings-item">
        <div class="settings-item__label">
          <span>送信キー</span>
        </div>
        <select id="sendKey" class="input">
          <option value="enter">Enter で送信</option>
          <option value="ctrl-enter">Ctrl+Enter で送信</option>
        </select>
      </div>
    </div>

    <!-- Tab: 応答 -->
    <div class="tab-content" id="tab-response">
      <div class="settings-section-title">応答スタイル</div>
      <div class="settings-item">
        <select id="responseStyle" class="input input--full">
          <option value="concise">簡潔（要点のみ）</option>
          <option value="standard" selected>標準（バランス型）</option>
          <option value="detailed">詳細（詳しい説明付き）</option>
          <option value="professional">専門的（技術的詳細重視）</option>
        </select>
      </div>

      <div class="settings-section-title">ユーザープロフィール</div>
      <div class="settings-item settings-item--stack">
        <label class="settings-item__label">専門レベル</label>
        <select id="userLevel" class="input input--full">
          <option value="">指定なし</option>
          <option value="beginner">初心者</option>
          <option value="intermediate">中級者</option>
          <option value="advanced">上級者</option>
          <option value="expert">専門家</option>
        </select>
      </div>
      <div class="settings-item settings-item--stack">
        <label class="settings-item__label">職業/専門分野</label>
        <input type="text" id="userProfession" class="input input--full" placeholder="例: 放射線科医、学生、研究者">
      </div>
      <div class="settings-item settings-item--stack">
        <label class="settings-item__label">興味・関心</label>
        <input type="text" id="userInterests" class="input input--full" placeholder="例: CT画像診断、機械学習">
      </div>

      <div class="settings-section-title">System Prompt</div>
      <div class="settings-item settings-item--stack">
        <div class="settings-item__row">
          <select id="systemPromptPresetSelect" class="input" style="flex:1">
            <option value="">-- プリセットを選択 --</option>
          </select>
          <button class="btn-sm btn-success" id="saveSystemPromptPresetBtn" title="保存">💾</button>
          <button class="btn-sm btn-danger" id="deleteSystemPromptPresetBtn" title="削除">🗑</button>
        </div>
        <textarea id="systemPrompt" class="textarea" rows="5">あなたは放射線画像診断、技術、研究のエキスパートアシスタントです。日本語で簡潔でバランスの取れたアドバイスを提供してください。フォーマルとカジュアルのバランスを保ち、専門用語は英語（日本語）の形式で表記してください。
応答の生成の前に、まず質問内容を確認し、医学用語についてユーザの入力に不備があれば、ユーザに確認してください。</textarea>
      </div>
    </div>

    <!-- Tab: 詳細 -->
    <div class="tab-content" id="tab-advanced">
      <div class="settings-section-title">表示オプション</div>
      <div class="settings-item">
        <div class="settings-item__label">
          <span>📊 信頼度・代替候補を表示</span>
          <span class="settings-item__desc">LM Studio v0.3.39以降が必要</span>
        </div>
        <label class="toggle" id="showLogprobsToggle" role="switch" aria-checked="false" tabindex="0">
          <input type="checkbox" hidden>
          <span class="toggle__track"><span class="toggle__thumb"></span></span>
        </label>
      </div>
      <div class="settings-item">
        <div class="settings-item__label">
          <span>🔄 モデル自動アンロード</span>
          <span class="settings-item__desc">モデル切替時にメモリ節約</span>
        </div>
        <label class="toggle" id="autoUnloadToggle" role="switch" aria-checked="false" tabindex="0">
          <input type="checkbox" hidden>
          <span class="toggle__track"><span class="toggle__thumb"></span></span>
        </label>
      </div>

      <div class="settings-section-title">プリセット編集</div>
      <div class="settings-item settings-item--stack">
        <label class="settings-item__label">編集するプリセット</label>
        <select id="presetEditSelect" class="input input--full"></select>
      </div>
      <div class="settings-item settings-item--stack">
        <label class="settings-item__label">新規プリセット名</label>
        <div class="settings-item__row">
          <input type="text" id="newPresetName" class="input" placeholder="例: 画像所見整理" style="flex:1">
          <button class="btn-sm btn-info" id="addPresetBtn">＋ 追加</button>
        </div>
      </div>
      <div class="settings-item settings-item--stack">
        <textarea id="presetEditText" class="textarea" rows="5"></textarea>
      </div>
      <div class="settings-item__row" style="gap:8px;flex-wrap:wrap">
        <button class="btn-sm btn-success" id="savePresetBtn">💾 保存</button>
        <button class="btn-sm btn-danger" id="resetPresetBtn">🔄 デフォルト</button>
        <button class="btn-sm btn-danger" id="deletePresetBtn">🗑 削除</button>
        <button class="btn-sm btn-secondary" id="resetAllPresetsBtn">全てリセット</button>
      </div>

      <div class="settings-section-title">データ管理</div>
      <div class="settings-item__row" style="gap:8px;flex-wrap:wrap">
        <button class="btn-sm btn-warning" id="resetSettingsBtn">🔄 設定をデフォルトに戻す</button>
        <button class="btn-sm btn-danger" id="clearAllDataBtn">🗑 すべての保存データを消す</button>
      </div>
    </div>

  </div>
</aside>

<!-- ===== Chat Area ===== -->
<main class="chat-area" id="chat" role="log" aria-live="polite">
  <!-- メッセージが動的に挿入される -->
</main>

<!-- ===== Preset Popover ===== -->
<div class="preset-popover" id="presetPanel" hidden>
  <div class="preset-popover__header">
    <strong>プリセット</strong>
    <button class="btn-ghost btn-sm" id="closePresetBtn" aria-label="閉じる">&times;</button>
  </div>
  <div class="preset-popover__list" id="presetList"></div>
</div>

<!-- ===== Input Area ===== -->
<footer class="input-area">
  <div class="input-card" id="inputCard">
    <div class="attachment-preview" id="attachmentList" hidden></div>
    <div class="input-card__row">
      <button class="btn-ghost btn-attach" id="attachBtn" aria-label="ファイルを添付" title="ファイルを添付">📎</button>
      <textarea id="prompt"
                placeholder="メッセージを入力..."
                autocomplete="off" autocorrect="off"
                autocapitalize="off" spellcheck="false"
                aria-label="メッセージ入力"></textarea>
      <button class="btn-send" id="send" aria-label="送信" disabled>▲</button>
    </div>
    <div class="input-card__actions">
      <button class="btn-tag" id="deepDiveBtn">🔍 深掘り</button>
      <button class="btn-tag" id="presetBtn">📋 Preset</button>
      <button class="btn-tag btn-tag--stop" id="stopBtn" disabled hidden>⏹ Stop</button>
    </div>
  </div>
  <input type="file" id="imageInput" accept="image/*" multiple hidden>
  <input type="file" id="fileInput" accept=".txt,.md,.json,.csv,.xml,.html,.css,.js,.ts,.py,.java,.c,.cpp,.h,.hpp,.sh,.yaml,.yml,.log,.pdf" multiple hidden>
</footer>

<!-- ===== Attach Menu (Popover) ===== -->
<div class="dropdown-menu dropdown-menu--attach" id="attachMenu" hidden>
  <button class="dropdown-item" id="attachImageBtn">📷 画像を添付</button>
  <button class="dropdown-item" id="attachFileBtn">📎 ファイルを添付</button>
</div>

<!-- ===== Medical Term Check Modal ===== -->
<div class="modal-overlay" id="termCheckModal" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="termCheckTitle">
    <div class="modal__header">
      <h3 id="termCheckTitle">🏥 医学用語チェック結果</h3>
      <button class="btn-ghost" id="termCheckClose" aria-label="閉じる">&times;</button>
    </div>
    <div class="modal__body">
      <div class="modal__content" id="termCheckContent"></div>
      <div class="modal__correction" id="termCheckCorrected" hidden>
        <strong>修正案:</strong>
        <div id="termCheckCorrectedText"></div>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn-secondary" id="termCheckCancel" hidden>キャンセル</button>
      <button class="btn-primary" id="termCheckAsIs">閉じる</button>
      <button class="btn-success" id="termCheckApply" hidden>修正を適用</button>
    </div>
  </div>
</div>

<!-- ===== Version Badge ===== -->
<div class="version-badge">v2.0</div>

<!-- ===== Application Script ===== -->
<script src="./js/app.js?v=2.0.0"></script>

</body>
</html>
