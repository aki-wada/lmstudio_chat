<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Local LLM Chat — JRC2026 Edition</title>
<link rel="stylesheet" href="assets/app.css" />
<link rel="stylesheet" href="assets/katex.min.css" />
<script src="./assets/marked.min.js"></script>
<script src="./assets/pdf.min.js"></script>
<script>
  // ★ v1.6.3互換: 外部ファイル読み込みの失敗を防ぐため、最低限のCSS/JSフォールバック
  window.onerror = function(msg, url, line) {
    if (msg.includes && msg.includes("marked")) {
      console.warn("[LLM Chat] marked.js 読込失敗。CDN fallback を試みます。");
      var s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/marked/marked.min.js";
      document.head.appendChild(s);
    }
  }
</script>
</head>
<body>
<header>
  <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;width:100%">
    <span></span>
    <strong style="font-size:1.3em;text-align:center">Local LLM Chat</strong>
    <span style="text-align:right">
      <button id="samplePromptsBtn" title="サンプルプロンプト集を別タブで開く" style="border:1px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.85);font-size:0.85em" onclick="window.open('SAMPLE_PROMPTS.html','_blank')">📖 プロンプト集</button>
    </span>
  </div>
  <div class="row" style="justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap;width:100%">
    <span style="display:flex;align-items:center;gap:6px">
      <span>モデル:</span>
      <select id="modelSelect" title="クリックでモデル一覧を更新">
        <!-- クリック時に自動更新 -->
      </select>
      <span id="compareRow" style="display:none">
        <span style="margin-left:16px">比較:</span>
        <select id="compareModelSelect" title="比較対象のモデルを選択">
          <!-- 比較モード時に表示 -->
        </select>
      </span>
    </span>
    <span style="display:flex;align-items:center;gap:6px">
      <button id="clearBtn" title="画面の会話をすべて消去する" class="btn-clear">🗑️ クリア</button>
      <button id="compareBtn" title="2つのモデルの回答を比較" style="border:2px solid #6f42c1;background:#fff;color:#6f42c1">⚖️ 比較</button>
      <button id="helpBtn" title="ヘルプを表示" style="border:2px solid #fd7e14;background:#fff;color:#fd7e14">❓</button>
      <button id="settingsBtn" title="設定">⚙️</button>
    </span>
  </div>
</header>

<div id="settingsPanel" class="settings-panel">
  <!-- タブナビゲーション -->
  <div class="settings-tabs">
    <button class="settings-tab active" data-tab="tab-basic">⚙️ 基本</button>
    <button class="settings-tab" data-tab="tab-model">🤖 モデル</button>
    <button class="settings-tab" data-tab="tab-prompt">💬 プロンプト</button>
    <button class="settings-tab" data-tab="tab-data">📂 データ</button>
  </div>

  <!-- ===== 基本タブ ===== -->
  <div class="settings-tab-content active" id="tab-basic">
    <div class="settings-columns">
      <div class="settings-col">
        <div class="settings-row">
          <label><input type="checkbox" id="darkModeToggle" /> 🌙 Dark Mode</label>
        </div>
        <div class="settings-row">
          <label><input type="checkbox" id="showWelcomeToggle" checked /> 🏠 起動時にオープニング画面を表示</label>
        </div>
        <div class="settings-row">
          <label><input type="checkbox" id="showSamplePromptsToggle" checked /> 📖 プロンプト集ボタンを表示</label>
        </div>
        <div class="settings-row">
          <label>送信キー:</label>
          <select id="sendKey">
            <option value="enter">Enter で送信</option>
            <option value="ctrl-enter">Ctrl+Enter で送信</option>
          </select>
        </div>
      </div>
    </div>
    <div class="settings-section-border"></div>
    <div class="settings-row"><label>👤 ユーザープロフィール</label></div>
    <div class="settings-columns">
      <div class="settings-col">
        <div class="settings-row">
          <label>AIがあなたを呼ぶ名前:</label>
          <input type="text" id="userName" placeholder="例: 田中先生" style="width:160px" />
        </div>
        <div class="settings-row">
          <label>あなたの専門レベル:</label>
          <select id="userLevel">
            <option value="">指定なし</option>
            <option value="beginner">初心者</option>
            <option value="intermediate">中級者</option>
            <option value="advanced">上級者</option>
            <option value="expert">専門家</option>
          </select>
        </div>
      </div>
      <div class="settings-col">
        <div class="settings-row">
          <label>職業/専門:</label>
          <input type="text" id="userProfession" placeholder="例: 放射線科医" style="width:160px" />
        </div>
        <div class="settings-row">
          <label>興味・関心:</label>
          <input type="text" id="userInterests" placeholder="例: CT画像診断" style="width:160px" />
        </div>
      </div>
    </div>
  </div>

  <!-- ===== プロンプトタブ ===== -->
  <div class="settings-tab-content" id="tab-prompt">
    <div class="settings-row">
      <label>System Prompt:</label>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <select id="systemPromptPresetSelect" style="flex:1;max-width:300px">
          <option value="">-- プリセットを選択 --</option>
        </select>
        <button id="saveSystemPromptPresetBtn" style="background:#28a745;padding:4px 12px" title="現在のSystem Promptを新規プリセットとして保存">💾 保存</button>
        <button id="deleteSystemPromptPresetBtn" style="background:#dc3545;padding:4px 12px" title="選択中のプリセットを削除">🗑</button>
      </div>
      <textarea id="systemPrompt">あなたは優秀なAIアシスタントです。ユーザーの質問に対して、正確で分かりやすい回答を日本語で提供してください。必要に応じて具体例や補足を加え、専門用語には簡単な説明を添えてください。</textarea>
    </div>
    <div class="settings-section-border"></div>
    <div class="settings-row"><label>📋 プリセット編集</label></div>
    <div class="settings-row">
      <label>編集するプリセット:</label>
      <select id="presetEditSelect"></select>
    </div>
    <div class="settings-row">
      <label>新規プリセット名:</label>
      <input type="text" id="newPresetName" placeholder="例: 画像所見整理" style="width:200px" />
      <button id="addPresetBtn" style="background:#17a2b8">＋ 追加</button>
    </div>
    <div class="settings-row">
      <textarea id="presetEditText" style="width:100%;max-width:600px;min-height:120px"></textarea>
    </div>
    <div class="settings-row">
      <button id="savePresetBtn" style="background:#28a745">💾 保存</button>
      <button id="resetPresetBtn" style="background:#dc3545">🔄 デフォルトに戻す</button>
      <button id="deletePresetBtn" style="background:#c82333">🗑 削除</button>
      <button id="resetAllPresetsBtn" style="background:#6c757d">全てリセット</button>
    </div>
  </div>

  <!-- ===== モデルタブ ===== -->
  <div class="settings-tab-content" id="tab-model">
    <div class="settings-row"><label>🔧 LLM パラメータ</label></div>
    <div class="settings-columns">
      <div class="settings-col">
        <div class="settings-row">
          <label>応答スタイル:</label>
          <select id="responseStyle">
            <option value="concise">簡潔</option>
            <option value="standard" selected>標準</option>
            <option value="detailed">詳細</option>
            <option value="professional">専門的</option>
          </select>
          <label style="margin-left:12px">言語:</label>
          <select id="responseLanguage">
            <option value="" selected>自動</option>
            <option value="ja">日本語</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="ko">한국어</option>
          </select>
        </div>
        <div class="settings-row">
          <label>Temperature:</label>
          <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" />
          <span id="tempValue">0.7</span>
        </div>
      </div>
      <div class="settings-col">
        <div class="settings-row">
          <label>Max Tokens:</label>
          <input type="number" id="maxTokens" min="1" max="8192" value="2048" />
        </div>
        <div class="settings-row">
          <label>Reasoning Effort:</label>
          <select id="reasoningEffort">
            <option value="">指定なし</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>
    </div>
    <div class="settings-row">
      <label><input type="checkbox" id="hideThinkingToggle" /> 🧠 思考プロセスを非表示</label>
    </div>
    <div class="settings-row">
      <label><input type="checkbox" id="disableThinkingToggle" /> 🚫 Thinkingモード無効化<small style="color:#888;margin-left:4px">（Qwen等）</small></label>
    </div>
    <div class="settings-section-border"></div>
    <div class="settings-row">
      <label>🔗 Base URL:</label>
      <input type="text" id="baseUrl" value="http://localhost:1234/v1" style="width:200px" />
    </div>
    <input type="hidden" id="apiKey" value="lmstudio" />
    <div class="settings-row">
      <label><input type="checkbox" id="autoUnloadToggle" /> 🔄 モデル切替時に自動アンロード</label>
    </div>
    <div class="settings-section-border"></div>
    <div class="settings-row">
      <label>👁️ 表示モデル管理</label>
      <span id="modelVisibilityCount" style="font-size:0.85em;color:#666">表示対象: 0 / 0</span>
      <button id="modelVisibilitySelectAllBtn" style="background:#28a745;padding:4px 12px;font-size:0.85em">すべて表示</button>
      <button id="modelVisibilityClearBtn" style="background:#dc3545;padding:4px 12px;font-size:0.85em">すべて非表示</button>
    </div>
    <div id="modelVisibilityList" style="max-height:300px;overflow-y:auto;border:1px solid #ddd;border-radius:8px;padding:8px;margin-top:4px"></div>
  </div>

  <!-- ===== データタブ ===== -->
  <div class="settings-tab-content" id="tab-data">
    <div class="settings-row"><label>💬 会話ログ管理</label></div>
    <div class="settings-row">
      <span id="sessionCount" style="font-size:0.85em;color:#666">保存ログ: 0件</span>
      <button id="createSessionBtn" style="background:#17a2b8;padding:4px 12px;font-size:0.85em">＋ 新規チャット</button>
    </div>
    <div id="sessionList" class="session-list"></div>
    <div class="settings-section-border"></div>
    <div class="settings-row"><label>🔧 データ管理</label></div>
    <div class="settings-row">
      <button id="resetSettingsBtn" style="background:#ffc107;color:#000">🔄 設定をデフォルトに戻す</button>
      <button id="clearAllDataBtn" style="background:#dc3545">🗑 すべての保存データを消す</button>
    </div>
    <div style="font-size:0.8em;color:#888;margin-top:2px;line-height:1.5">
      ※「すべての保存データを消す」を実行すると、会話履歴・設定・プリセット・セッションなど、このアプリの全データが初期化されます。
    </div>
  </div>

  <!-- 閉じるボタン（共通） -->
  <div class="settings-row" style="margin-top:12px">
    <button id="closeSettingsBtn" style="background:#6c757d">← 戻る</button>
  </div>
</div>

<div id="chat"></div>

<div id="presetPanel" class="preset-panel">
  <div class="preset-header">
    <strong>📋 プリセットプロンプト</strong>
    <button id="closePresetBtn" class="preset-close">×</button>
  </div>
  <div class="preset-list" id="presetList"></div>
</div>

<div id="input-area">
  <div style="display:flex;flex-direction:column;gap:8px">
    <label for="imageInput" style="padding:0 12px;height:36px;line-height:36px;font-size:0.95em;border:none;border-radius:8px;background:#28a745;color:#fff;cursor:pointer;text-align:center">
      📷 Image
    </label>
    <input type="file" id="imageInput" accept="image/*" multiple style="display:none" />
    <label for="fileInput" style="padding:0 12px;height:36px;line-height:36px;font-size:0.95em;border:none;border-radius:8px;background:#007bff;color:#fff;cursor:pointer;text-align:center">
      📎 File
    </label>
    <input type="file" id="fileInput" accept=".txt,.md,.json,.csv,.xml,.html,.css,.js,.ts,.py,.java,.c,.cpp,.h,.hpp,.sh,.yaml,.yml,.log,.pdf" multiple style="display:none" />
    <button id="deepDiveBtn" style="padding:0 12px;height:36px;font-size:0.95em;border:2px solid #6f42c1;border-radius:8px;background:#fff;color:#6f42c1;cursor:pointer;text-align:center;white-space:nowrap;transition:all 0.2s">
      🔍 深掘り
    </button>
  </div>
  <div style="display:flex;flex-direction:column;flex:1;gap:8px;min-width:0">
    <div id="attachmentList" style="display:none;padding:8px;background:#f8f9fa;border-radius:8px;border:1px solid #ccc;font-size:0.9em;max-height:120px;overflow-y:auto;overflow-x:hidden">
      <!-- 添付ファイル一覧がここに表示される -->
    </div>
    <textarea id="prompt"
              placeholder="メッセージを入力…（送信キーは設定で変更可能）"
              autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <button id="send">🚀 Send</button>
    <button id="stopBtn" disabled>⏹ Stop</button>
    <button id="presetBtn" style="padding:0 12px;height:36px;font-size:0.95em;border:none;border-radius:8px;background:#17a2b8;color:#fff;cursor:pointer;text-align:center">
      📋 Preset
    </button>
  </div>
</div>

<!-- 医学用語チェックダイアログ -->
<div id="termCheckModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center">
  <div style="background:#fff;border-radius:12px;padding:24px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,0.3)">
    <h3 style="margin:0 0 16px;color:#333">🏥 AI応答の医学用語チェック結果</h3>
    <div id="termCheckContent" style="background:#f8f9fa;padding:16px;border-radius:8px;margin-bottom:16px;line-height:1.6"></div>
    <div id="termCheckCorrected" style="display:none;background:#e8f5e9;padding:12px;border-radius:8px;margin-bottom:16px;border-left:4px solid #4caf50">
      <strong>修正案:</strong>
      <div id="termCheckCorrectedText" style="margin-top:8px;white-space:pre-wrap"></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
      <button id="termCheckCancel" style="display:none;padding:8px 16px;border:1px solid #ccc;background:#fff;border-radius:6px;cursor:pointer">キャンセル</button>
      <button id="termCheckAsIs" style="padding:8px 16px;border:none;background:#17a2b8;color:#fff;border-radius:6px;cursor:pointer">閉じる</button>
      <button id="termCheckApply" style="display:none;padding:8px 16px;border:none;background:#28a745;color:#fff;border-radius:6px;cursor:pointer">修正して送信</button>
    </div>
  </div>
</div>

<!-- キーボードショートカットモーダル -->
<div id="shortcutsModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center">
  <div class="shortcuts-content">
    <h3 class="shortcuts-title">⌨️ キーボードショートカット</h3>
    <table class="shortcuts-table">
      <tr><td><kbd>Enter</kbd> / <kbd>Ctrl+Enter</kbd></td><td>送信（設定による）</td></tr>
      <tr><td><kbd>Shift+Enter</kbd></td><td>改行</td></tr>
      <tr><td><kbd>Ctrl/⌘</kbd> + <kbd>V</kbd></td><td>画像ペースト</td></tr>
      <tr><td><kbd>Ctrl/⌘</kbd> + <kbd>K</kbd></td><td>履歴クリア</td></tr>
      <tr><td><kbd>Ctrl/⌘</kbd> + <kbd>/</kbd></td><td>ショートカット一覧</td></tr>
      <tr><td><kbd>Esc</kbd></td><td>パネルを閉じる</td></tr>
    </table>
    <div style="text-align:right;margin-top:16px">
      <button id="shortcutsCloseBtn" style="padding:8px 16px;border:none;background:#6c757d;color:#fff;border-radius:6px;cursor:pointer">閉じる</button>
    </div>
  </div>
</div>

<div id="version-badge" style="position:fixed;bottom:8px;right:12px;font-size:0.75em;color:#999;pointer-events:none;z-index:1">v1.8.0</div>

<script src="./js/app.js?v=1.8.0"></script>
</body>
</html>
